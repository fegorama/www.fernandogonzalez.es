<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Fernando González</title>
<script>
function teletipo(cad, tmp, iden, cnt) {
    if (cnt== null) cnt=0;
    var letra = cad.substr(cnt,1)
    cuadro=document.getElementById(iden);
    while (letra == " ")
      {
      cnt++;
      letra += cad.substr(cnt,1);
     }
    cuadro.innerHTML += letra;
    cnt++
    if (cnt < cad.length){
       tempor=setTimeout(teletipo,tmp,cad,tmp,iden,cnt); 
     }	 
}
function borra(iden) {
	document.getElementById(iden).innerHTML = "";
}
</script>
</head>
<body style="background-color:black; color: white" onload="main()"
<tt><h2 id="m2"></h2></tt>
<br>
<tt><h3 id="m3"></h3></tt>
<tt><h3 id="m4"></h3></tt>
<tt><h3 id="m5"></h3></tt>

<script language="javascript">
	function main() {
	setTimeout(()=>{teletipo(btoa("Fernando González"), 10, 'm2');},1000);
	setTimeout(()=>{borra('m2');},2000);
	setTimeout(()=>{teletipo("Fernando González", 10, 'm2');},2100);

  setTimeout(()=>{teletipo(btoa("  * Ingeniería inversa"), 10, 'm3');},2000);
	setTimeout(()=>{borra('m3');},3000);
	setTimeout(()=>{teletipo("  * Ingeniería inversa", 10, 'm3');},3100);

  setTimeout(()=>{teletipo(btoa("  * Pentesting y análisis"), 10, 'm4');},2000);
	setTimeout(()=>{borra('m4');},3000);
	setTimeout(()=>{teletipo("  * Pentesting y análisis", 10, 'm4');},3100);

  setTimeout(()=>{teletipo(btoa("  * Código seguro"), 10, 'm5');},2000);
	setTimeout(()=>{borra('m5');},3000);
	setTimeout(()=>{teletipo("  * Código seguro", 10, 'm5');},3100);
}
</script>
</body>
</html>
